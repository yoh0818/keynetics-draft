<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — Tutorials</title>
<link rel="stylesheet" href="styles.css" />

<style>
:root{
  --blue:#4f76d6;
}

/* MAIN Layout */
main{
  min-height:calc(100dvh - 72px);
  display:grid;
  place-items:center;
  padding:16px;
}

.level-row{
  width:min(860px, 100%);
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

/* Beginner / Intermidate / Advanced */ 
.pill-link{
  width:260px;
  height:90px;
  border-radius:999px;
  background:var(--blue);
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:800;
  box-shadow:0 0 0 rgba(0,0,0,0);
  transition:transform .15s ease, box-shadow .15s ease;
  position:relative;
  overflow:hidden;
}

.pill-link:hover{
  transform:translateY(-3px);
  box-shadow:0 14px 28px rgba(0,0,0,.10);
}

.pill-link::before{
  content:"";
  position:absolute;
  inset:10px;
  background:url("Icon.svg") center/contain no-repeat;
  opacity:.18;
  pointer-events:none;
}

.pill-link span{
  position:relative;
  z-index:1;
}

.hamburger__icon{
  color:#3F75E0;
}

.brand strong{
  color:#3F75E0;
}

/* Mobile Layout */
@media (max-width: 768px){
  main{
    min-height:calc(100dvh - 72px);
    padding:20px 14px;
  }

  .level-row{
    width:min(420px, 100%);
    gap:14px;
  }

  .pill-link{
    width:100%;
    height:82px;
    font-size:20px;
  }
}


@media (max-width: 480px){
  main{
    min-height:calc(100dvh - 72px);
    padding:18px 12px;
  }

  .level-row{
    width:100%;
    gap:12px;
  }

  .pill-link{
    width:100%;
    height:72px;
    font-size:18px;
  }

  .pill-link::before{
    inset:12px;
    opacity:.16;
  }
}
</style>
</head>

<body>
<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="sidebar__top">
    <strong>MENU</strong>
    <button class="closebtn" id="closeMenu" aria-label="Close menu">×</button>
  </div>

  <nav aria-label="Primary">
    <ul class="navlist">

      <li>
        <a href="index.html" class="nav-with-icon">
          <span class="nav-icon-spacer"></span>
          <span>Home</span>
        </a>
      </li>

      <li>
        <a href="tutorials.html" class="nav-with-icon is-active">
          <img src="1.svg" class="nav-icon" alt="">
          <span>After Effects Tutorials</span>
        </a>
      </li>

      <li>
        <a href="plugins.html" class="nav-with-icon">
          <img src="2.svg" class="nav-icon" alt="">
          <span>Useful Plugins/Scripts</span>
        </a>
      </li>

      <li>
        <a href="quiz.html" class="nav-with-icon">
          <img src="3.svg" class="nav-icon" alt="">
          <span>Quiz</span>
        </a>
      </li>

      <li>
        <a href="artists.html" class="nav-with-icon">
          <img src="4.svg" class="nav-icon" alt="">
          <span>Motion Graphics Artists &amp; Companies</span>
        </a>
      </li>

    </ul>
  </nav>

 
</aside>

<header class="topbar">
  <div class="topbar__inner">
    <button class="hamburger" id="openMenu" aria-label="Open menu" aria-expanded="false">
      <span class="hamburger__icon">☰</span>
    </button>

    <div class="brand">
      <strong>Keynetics</strong>
    </div>
  </div>
</header>

<main>
  <section class="level-row" aria-label="Tutorial levels">
    <a class="pill-link" href="tutorials-beginner.html"><span>Beginner</span></a>
    <a class="pill-link" href="tutorials-intermediate.html"><span>Intermediate</span></a>
    <a class="pill-link" href="tutorials-advanced.html"><span>Advanced</span></a>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
