<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keynetics — Quiz</title>
<link rel="stylesheet" href="styles.css" />

<style>
:root{
  --quiz-accent:#9B55D8;
}

/* Keyframe Design */

.bg-svg{
  position:fixed;
  pointer-events:none;
  opacity:.18;
  z-index:0;
}

.bg-svg.top-right{
  top:-250px;
  right:-230px;
  width:600px;
}

.bg-svg.bottom-left{
  bottom:-300px;
  left:-150px;
  width:600px;
}

/* Quiz Main Layout */

.wrapper{
  min-height:calc(100dvh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  position:relative;
  z-index:1;
}

.card{
  width:min(800px,100%);
  background:#fff;
  border:1px solid #000;
  border-radius:20px;
  padding:44px 42px;
}

.progress{
  margin-bottom:18px;
  color:#666;
  font-size:14px;
}

h1{
  margin:0 0 30px;
  font-size:clamp(28px,3.2vw,34px);
  color:var(--quiz-accent);
  line-height:1.28;
  max-width:16ch;
}

#options{
  display:grid;
  gap:14px;
}

.option{
  display:block;
  width:100%;
  padding:18px 20px;
  border-radius:12px;
  border:1px solid #000;
  background:#fff;
  cursor:pointer;
  font-size:16px;
  transition:.15s;
  text-align:left;
}

.option:hover{
  background:var(--quiz-accent);
  border-color:var(--quiz-accent);
  color:#fff;
}

.option.correct{
  background:#22c55e;
  border-color:#22c55e;
  color:#fff;
}

.option.wrong{
  background:#d9d9d9;
  border-color:#bfbfbf;
}



.actions{
  margin-top:34px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}

.actions-left,
.actions-center,
.actions-right{
  display:flex;
}

.actions-center{
  margin-left:auto;
  margin-right:auto;
}

.btn{
  min-width:140px;
  padding:14px 24px;
  border-radius:12px;
  border:1px solid #000;
  background:#fff;
  color:#111;
  cursor:pointer;
  font-size:15px;
  transition:.15s;
}

.btn:hover{
  background:var(--quiz-accent);
  border-color:var(--quiz-accent);
  color:#fff;
}

.btn:disabled{
  opacity:.45;
  cursor:default;
}

.btn:disabled:hover{
  background:#fff;
  color:#111;
  border-color:#000;
}



.nav-with-icon{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-icon{
  width:16px;
  height:16px;
  object-fit:contain;
  flex:0 0 16px;
}

.hamburger{
  width:44px;
  height:44px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.hamburger__icon{
  font-size:18px;
  line-height:1;
  transform:translateY(-1px);
  color:var(--quiz-accent);
}

.brand strong{
  color:var(--quiz-accent);
}

/* Mobile Layout */

@media (max-width: 768px){
  .bg-svg{
    display:none;
  }

  .wrapper{
    align-items:flex-start;
    padding:24px 14px 56px;
  }

  .card{
    padding:28px 20px;
    border-radius:16px;
  }

  .progress{
    margin-bottom:14px;
    font-size:13px;
  }

  h1{
    margin:0 0 22px;
    font-size:clamp(24px,7vw,30px);
    max-width:100%;
  }

  .option{
    padding:16px 16px;
    font-size:15px;
  }

  .actions{
    margin-top:28px;
    flex-direction:column;
    align-items:stretch;
    gap:12px;
  }

  .actions-left,
  .actions-center,
  .actions-right{
    display:block;
    width:100%;
  }

  .actions-center{
    margin:0;
  }

  .btn{
    width:100%;
    min-width:0;
    padding:14px 16px;
    font-size:15px;
  }
}



@media (max-width: 480px){
  .wrapper{
    padding:20px 12px 44px;
  }

  .card{
    padding:22px 14px;
    border-radius:14px;
  }

  h1{
    margin:0 0 18px;
    font-size:clamp(22px,8vw,28px);
  }

  .option{
    padding:14px 12px;
    font-size:14px;
    border-radius:10px;
  }

  .btn{
    font-size:14px;
    border-radius:10px;
  }
}
</style>
</head>

<body>

<img src="3(storke).svg" class="bg-svg top-right" alt="">
<img src="3(storke).svg" class="bg-svg bottom-left" alt="">

<div class="overlay" id="overlay" hidden></div>

<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="sidebar__top">
    <strong>MENU</strong>
    <button class="closebtn" id="closeMenu" aria-label="Close menu">×</button>
  </div>

  <nav aria-label="Primary">
    <ul class="navlist">
      <li><a href="index.html">Home</a></li>

      <li>
        <a href="tutorials.html" class="nav-with-icon">
          <img src="1.svg" class="nav-icon" alt="">
          <span>After Effects Tutorials</span>
        </a>
      </li>

      <li>
        <a href="plugins.html" class="nav-with-icon">
          <img src="2.svg" class="nav-icon" alt="">
          <span>Useful Plugins/Scripts</span>
        </a>
      </li>

      <li>
        <a href="quiz.html" class="nav-with-icon is-active">
          <img src="3.svg" class="nav-icon" alt="">
          <span>Quiz</span>
        </a>
      </li>

      <li>
        <a href="artists.html" class="nav-with-icon">
          <img src="4.svg" class="nav-icon" alt="">
          <span>Motion Graphics Artists &amp; Companies</span>
        </a>
      </li>
    </ul>
  </nav>
</aside>

<header class="topbar">
  <div class="topbar__inner">
    <button class="hamburger" id="openMenu" aria-label="Open menu" aria-expanded="false">
      <span class="hamburger__icon">☰</span>
    </button>

    <div class="brand">
      <strong>Keynetics</strong>
    </div>
  </div>
</header>

<div class="wrapper">
  <div class="card">
    <div class="progress" id="progress"></div>
    <h1 id="question"></h1>
    <div id="options"></div>

    <div class="actions">
      <div class="actions-left">
        <button class="btn" id="backBtn" type="button" onclick="prevQuestion()">Back</button>
      </div>

      <div class="actions-center">
        <button class="btn" type="button" onclick="restartQuiz()">Restart</button>
      </div>

      <div class="actions-right">
        <button class="btn" id="nextBtn" type="button" onclick="nextQuestion()">Next</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
const quizData = [
  {
    question:"Select the option that is not a feature for controlling speed in After Effects.",
    options:["1. Speed Graph","2. Value Graph","3. Keyframe Velocity","4. Keyframe Interpolation"],
    correct:3
  },
  {
    question:"Why do designers use a Null Object?",
    options:["1. To apply color effects","2. To control multiple layers with one controller","3. To export videos faster","4. To reduce file size"],
    correct:1
  },
  {
    question:"What is the purpose of an Adjustment Layer?",
    options:["1. To create 3D objects","2. To apply effects to all layers below it","3. To animate text only","4. To render compositions"],
    correct:1
  },
  {
    question:"What is a Track Matte used for in After Effects?",
    options:["1. To apply color correction","2. To control visibility using another layer’s alpha or luminance","3. To animate text speed","4. To export video"],
    correct:1
  },
  {
    question:"Which keyframe type creates constant speed without easing?",
    options:["1. Easy Ease","2. Bezier","3. Linear","4. Hold"],
    correct:2
  },
  {
    question:"Why might a 3D layer not respond to the camera?",
    options:["1. It has too many effects","2. It is not set as a 3D layer","3. Motion blur is off","4. Opacity is 100%"],
    correct:1
  },
  {
    question:"Which of the following is NOT a shortcut key used to reveal a keyframe property in After Effects?",
    options:["1. P (Position)","2. S (Scale)","3. O (Opacity)","4. R (Rotation)"],
    correct:2
  }
];

let currentQuestion = 0;
let answered = false;

function renderQuestion(){
  const q = quizData[currentQuestion];
  document.getElementById("progress").textContent = `Question ${currentQuestion + 1} / ${quizData.length}`;
  document.getElementById("question").textContent = q.question;

  const box = document.getElementById("options");
  box.innerHTML = "";
  answered = false;

  document.getElementById("backBtn").disabled = currentQuestion === 0;
  document.getElementById("nextBtn").textContent = currentQuestion === quizData.length - 1 ? "Finish" : "Next";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.type = "button";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    box.appendChild(btn);
  });
}

function selectAnswer(i){
  if(answered) return;
  answered = true;

  const q = quizData[currentQuestion];
  document.querySelectorAll(".option").forEach((b, index) => {
    b.disabled = true;
    if(index === q.correct) b.classList.add("correct");
    if(index === i && i !== q.correct) b.classList.add("wrong");
  });
}

function nextQuestion(){
  if(currentQuestion < quizData.length - 1){
    currentQuestion++;
  }else{
    currentQuestion = 0;
  }
  renderQuestion();
}

function prevQuestion(){
  if(currentQuestion > 0){
    currentQuestion--;
    renderQuestion();
  }
}

function restartQuiz(){
  currentQuestion = 0;
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
